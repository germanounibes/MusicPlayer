<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>music player</title>
</head>

<body>
    <div class="music-container">
        <div class="music-info">

            <section id="infomusica" class="glassinfo prev">
                <div class="img-container">
                    <img src="" alt="capa da musica" id="coverPrev">
                </div>

                <h4 id="tituloPrev"></h4>

                <div class="progress-container">
                    <div class="progress"></div>
                </div>
            </section>

            <section id="infomusica" class="glassinfo atual">
                <div class="img-container">
                    <img src="" alt="capa da musica" id="cover">
                </div>

                <h4 id="titulo"></h4>

                <div class="progress-container">
                    <div class="progress"></div>
                </div>
            </section>

            <section id="infomusica" class="glassinfo next>
                <div class="img-container">
                    <img src="" alt="capa da musica" id="coverNext">
                </div>

                <h4 id="tituloNext"></h4>

                <div class="progress-container">
                    <div class="progress"></div>
                </div>
            </section>

            <audio id="audio"></audio>

            <section class="navegation glassbutton" id="controle">
                <button id="prev" class="action-btn">
                    <i class="fas fa-backward"></i>
                </button>
                <button id="play" class="action-btn action-btn-big">
                    <i class="fas fa-play"></i>
                </button>
                <button id="next" class="action-btn">
                    <i class="fas fa-forward"></i>
                </button>
            </section>

        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
